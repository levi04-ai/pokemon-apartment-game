<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדירה של טל ואדם</title>
    <link rel="stylesheet" href="css/style.css?v=60">
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
    window.onerror = function(msg, url, line) {
        document.title = 'ERR: ' + msg + ' @ ' + url.split('/').pop() + ':' + line;
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;background:red;color:white;padding:10px;z-index:9999;font-size:14px';
        d.textContent = 'ERROR: ' + msg + ' @ ' + url.split('/').pop() + ':' + line;
        document.body.appendChild(d);
    }
    </script>
    <script src="js/tiles.js?v=60"></script>
    <script src="js/sprites.js?v=60"></script>
    <script src="js/map.js?v=60"></script>
    <script src="js/ui.js?v=60"></script>
    <script src="js/player.js?v=60"></script>
    <script src="js/npc.js?v=60"></script>
    <script src="js/puzzle.js?v=60"></script>
    <script src="js/game.js?v=60"></script>
</body>
</html>
