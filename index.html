<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הדירה של טל ואדם</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=240">
    <script>
    window.onerror = function(msg, url, line) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;background:red;color:white;padding:8px;z-index:9999;font-size:12px';
        d.textContent = 'ERR: ' + msg + ' @ ' + url.split('/').pop() + ':' + line;
        document.body.appendChild(d);
    }
    </script>
</head>
<body>
    <div id="mobileMsg" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; color:#FFF; justify-content:center; align-items:center; flex-direction:column; z-index:9999; text-align:center; padding:40px;">
        <div style="font-size:50px; margin-bottom:30px;">🎮</div>
        <div style="font-family:'PublicPixel',monospace; font-size:18px; line-height:2; direction:rtl;">
            לא היה מספיק תקציב לפתח את המשחק גם למובייל
            <br><br>
            נא לעבור למחשב 💻
        </div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="mobileControls" style="display:none">
        <div class="dpad">
            <button data-key="ArrowUp">▲</button>
            <button data-key="ArrowLeft">◄</button>
            <button data-key="ArrowRight">►</button>
            <button data-key="ArrowDown">▼</button>
        </div>
        <div class="action-buttons">
            <button class="btn-esc" data-key="Escape">ESC</button>
            <button class="btn-enter" data-key="Enter">Enter</button>
        </div>
    </div>
    <script src="js/tiles.js?v=240"></script>
    <script src="js/sprites.js?v=240"></script>
    <script src="js/map.js?v=240"></script>
    <script src="js/ui.js?v=240"></script>
    <script src="js/player.js?v=240"></script>
    <script src="js/npc.js?v=240"></script>
    <script src="js/puzzle.js?v=240"></script>
    <script src="js/game.js?v=240"></script>
</body>
</html>
