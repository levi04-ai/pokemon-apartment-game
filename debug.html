<h2>Debug</h2>
<pre id="log"></pre>
<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
    console.log(msg);
}
window.onerror = function(msg, url, line) {
    log('ERROR: ' + msg + ' @ ' + url.split('/').pop() + ':' + line);
    return true;
};
</script>
